    <script>
      (function patchGoogleTranslateReactInterop() {
        const originalRemoveChild = Node.prototype.removeChild
        const originalInsertBefore = Node.prototype.insertBefore

        // Google Translate mutates DOM text nodes outside React's ownership.
        // Keep this guard in place so route changes do not crash after translation.
        Node.prototype.removeChild = function patchedRemoveChild(child) {
          if (child && child.parentNode && child.parentNode !== this) {
            return child.parentNode.removeChild(child)
          }
          if (!child || child.parentNode !== this) {
            return child
          }
          return originalRemoveChild.call(this, child)
        }

        Node.prototype.insertBefore = function patchedInsertBefore(newNode, referenceNode) {
          if (referenceNode && referenceNode.parentNode && referenceNode.parentNode !== this) {
            return this.appendChild(newNode)
          }
          return originalInsertBefore.call(this, newNode, referenceNode)
        }
      })()

      function googleTranslateElementInit() {
        if (!window.google || !window.google.translate) return
        new window.google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'en,th',
            layout: window.google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false,
          },
          'google_translate_element',
        )
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/index.js"></script>
    <!-- built files will be auto injected -->
  </body>
